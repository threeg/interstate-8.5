name: interstate-8-5
recipe: drupal11
config:
  webroot: web
  php: '8.3'
  database: mariadb:10.11
  drush: '*'
  composer_version: '2'
  via: nginx

services:
  legacy:
    type: mariadb:10.11
    creds:
      user: legacy
      password: legacy
      database: legacy
  node:
    type: node:22

tooling:
  node:
    service: node
  npm:
    service: node
    dir: /app/web/themes/custom/interstate_8

